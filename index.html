<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q4 Practice 1</title>
</head>
<body>
    <h1>Javascript Conditional Statements</h1>

    <input type="text" class="form-control" id="Age" placeholder="Enter your age">
    <button class="btn btn-info" onclick="checkAge()">Check</button>

    <script>
        function checkAge() {
            var age = document.getElementById("Age").value;

            if (isNaN(age) || age < 0) {
                alert("Please enter a valid age.");
            }
            else if(age < 18){
                alert("You are a minor.");
            }
            else if(age > 18){
                alert("You are an adult.");
            }
            else{
                alert("Age could not be determined.");
            }
        }
    </script>
</body>
</html>
